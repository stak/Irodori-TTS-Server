services:
  api:
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    ipc: host
    security_opt:
      - seccomp=unconfined
    # Values here override .env inside the container, so each entry
    # interpolates the host-side .env value and only falls back to the
    # default when unset.
    environment:
      IRODORI_MODEL_DEVICE: ${IRODORI_MODEL_DEVICE:-cuda}
      IRODORI_CODEC_DEVICE: ${IRODORI_CODEC_DEVICE:-cuda}
      IRODORI_MODEL_PRECISION: ${IRODORI_MODEL_PRECISION:-bf16}
      IRODORI_CODEC_PRECISION: ${IRODORI_CODEC_PRECISION:-bf16}
      IRODORI_PRELOAD: ${IRODORI_PRELOAD:-false}
      # The performance fork's CUDA-graph path is validated on NVIDIA CUDA
      # only. ROCm reports itself as a CUDA device; capture failures fall
      # back to eager execution, but if you hit problems set
      # IRODORI_DISABLE_CUDA_GRAPH=1 and IRODORI_DISABLE_FP16_DECODE=1.
      # Irodori-TTS performance fork toggles (defaults shown; see
      # https://github.com/stak/Irodori-TTS/blob/main/docs/performance.md).
      IRODORI_DISABLE_TF32: ${IRODORI_DISABLE_TF32:-0}
      IRODORI_DISABLE_LORA_MERGE: ${IRODORI_DISABLE_LORA_MERGE:-0}
      IRODORI_DISABLE_CUDA_GRAPH: ${IRODORI_DISABLE_CUDA_GRAPH:-0}
      IRODORI_DISABLE_DURATION_GRAPH: ${IRODORI_DISABLE_DURATION_GRAPH:-0}
      IRODORI_DISABLE_FP16_DECODE: ${IRODORI_DISABLE_FP16_DECODE:-0}
      IRODORI_TEXT_BUCKETS: ${IRODORI_TEXT_BUCKETS:-64}
      IRODORI_COMPILE: ${IRODORI_COMPILE:-0}
      IRODORI_CUDA_GRAPH_BUCKET: ${IRODORI_CUDA_GRAPH_BUCKET:-16}
      IRODORI_CUDA_GRAPH_CACHE: ${IRODORI_CUDA_GRAPH_CACHE:-64}
